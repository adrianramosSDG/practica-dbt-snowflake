version: 2

models:
  - name: stg_lineitem
    description: "Modelo staging de líneas de pedido. Contiene el detalle de cada producto incluido en un pedido."
    columns:
      - name: orderkey
        description: "Identificador del pedido al que pertenece la línea."
        tests:
          - not_null

      - name: linenumber
        description: "Número de línea dentro del pedido."
        tests:
          - not_null

      - name: partkey
        description: "Identificador del producto."

      - name: suppkey
        description: "Identificador del proveedor."

      - name: quantity
        description: "Cantidad del producto pedida."

      - name: extendedprice
        description: "Importe bruto de la línea antes de descuento."

      - name: discount
        description: "Descuento aplicado a la línea."

      - name: tax
        description: "Impuesto aplicado a la línea."

      - name: returnflag
        description: "Indicador de devolución."
        tests:
          - accepted_values:
              arguments:
                values: ['N', 'R', 'A']

      - name: linestatus
        description: "Estado de la línea del pedido."
        tests:
          - accepted_values:
              arguments:
                values: ['F', 'O', 'P']

      - name: shipdate
        description: "Fecha de envío."
        tests:
          - date_range

      - name: commitdate
        description: "Fecha de compromiso."
        tests:
          - date_range

      - name: receiptdate
        description: "Fecha de recepción."
        tests:
          - date_range

      - name: shipinstruct
        description: "Instrucciones de envío."

      - name: shipmode
        description: "Modo de envío."

      - name: comment
        description: "Comentario asociado a la línea."
  - name: stg_orders
    columns:
      - name: orderdate
        tests:
          - date_range
      - name: orderstatus
        tests:
          - accepted_values:
              arguments:
                values: ['F', 'O', 'P']
      - name: priorityname
        tests:
          - accepted_values:
              arguments:
                values: ['NOT SPECIFIED', 'URGENT', 'LOW', 'MEDIUM', 'HIGH']
  - name: stg_customers
    columns:
      - name: phone
        tests:
          - phone_format
  - name: stg_supplier
    columns:
      - name: phone
        tests:
          - phone_format