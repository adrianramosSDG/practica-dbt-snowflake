version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique

  - name: dim_product
    columns:
      - name: product_key
        tests:
          - not_null
          - unique

  - name: dim_supplier
    columns:
      - name: supplier_key
        tests:
          - not_null
          - unique

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - not_null
          - unique